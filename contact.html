  <link rel="stylesheet" href="css/style.css" />
  <style>
    .soon { min-height: 90vh; display: grid; place-items: center; padding: 64px 24px;
      background: radial-gradient(900px 400px at 50% 0%, rgba(8,145,178,.10), transparent 60%), #fff; text-align: center; }
    .soon__card { max-width: 640px; }
    .soon h1 { font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 12px; }
    .soon p { color: var(--c-muted); font-size: 1.1rem; margin-bottom: 12px; }
    .soon__actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
    .soon__mark { width: 76px; height: 76px; margin: 0 auto 20px; display: grid; place-items: center;
      border-radius: 22px; background: linear-gradient(135deg, var(--c-primary) 0%, #06b6d4 100%);
      color: #fff; box-shadow: var(--shadow-glow); }
    .soon__mark svg { width: 44px; height: 44px; }
    .soon address {
      font-style: normal; color: var(--c-text-soft);
      margin: 8px 0 4px; line-height: 1.7;
    }
    .soon__regd {
      display: inline-block; font-size: .85rem; color: var(--c-muted);
      letter-spacing: .04em; margin-top: 4px;
      padding: 3px 10px; border: 1px solid var(--c-border); border-radius: var(--r-pill);
    }
  </style>
</head>
<body>
  <main>
    <section class="soon">
      <div class="soon__card">
        <div class="soon__mark" aria-hidden="true">
          <svg viewBox="0 0 64 64"><path fill="currentColor" d="M32 6c-8 0-14 4-18 4S6 14 6 22c0 8 4 14 6 22 1 6 4 14 8 14 5 0 5-12 12-12s7 12 12 12c4 0 7-8 8-14 2-8 6-14 6-22 0-8-4-12-8-12s-10-4-18-4z"/></svg>
        </div>
        <span class="eyebrow eyebrow--center">Contact</span>
        <h1>The full contact page is coming soon</h1>
        <p>Until then, here's how to reach us — fastest replies on WhatsApp.</p>

        <address>
          Ganpati Complex, 1st Floor,<br />
          25 Neshvilla Road, Chukkuwala, Dehradun 248001
        </address>
        <span class="soon__regd">Regd. No. 3004</span>

        <div class="soon__actions">
          <a href="tel:+918077645073" class="btn btn--primary">Call 80776 45073</a>
          <a href="https://wa.me/918077645073?text=Hi%2C%20I%27d%20like%20to%20book%20an%20appointment%20at%20Global%20Dental%20Care."
             class="btn btn--outline" target="_blank" rel="noopener">WhatsApp Us</a>
          <a href="index.html" class="btn btn--ghost" style="color: var(--c-primary-700); background: var(--c-primary-50); border-color: var(--c-primary-100);">← Home</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
