<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Global Dental Care — Every Smile Is Precious. Dehradun's trusted dental clinic. 5.0 stars on Google.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0e7490"/>
      <stop offset="55%"  stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%"   stop-color="#67e8f9" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.1" cy="0.9" r="0.55">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative tooth silhouettes -->
  <g opacity="0.08" fill="#ffffff" filter="url(#soft)">
    <path d="M1080 60c-40 0-60 16-90 16S930 86 930 124c0 32 22 50 32 90 6 24 16 78 38 78 24 0 24-60 50-60h32c26 0 26 60 50 60 22 0 32-54 38-78 10-40 32-58 32-90 0-38-16-48-60-48S1120 60 1080 60z"/>
    <path d="M120 470c-26 0-40 10-58 10s-38 6-38 30c0 22 14 32 22 60 4 16 10 50 24 50 16 0 16-40 32-40h22c16 0 16 40 32 40 14 0 20-34 24-50 8-28 22-38 22-60 0-24-10-30-38-30S146 470 120 470z"/>
  </g>

  <!-- Logo block (tooth mark + brand name) -->
  <g transform="translate(80, 100)">
    <!-- Logo mark: rounded square with white tooth -->
    <rect width="100" height="100" rx="22" fill="#ffffff"/>
    <path transform="translate(18, 18) scale(1.04)"
          fill="#0891b2"
          d="M32 8c-7 0-12 3.5-18 3.5S6 14 6 22c0 8 4 13 6 21 1 4.5 3 14 7 14 4.5 0 4.5-12 9.5-12h7c5 0 5 12 9.5 12 4 0 6-9.5 7-14 2-8 6-13 6-21 0-8-4-10.5-8-10.5S39 8 32 8z"/>

    <!-- Brand text -->
    <text x="124" y="46" fill="#ffffff" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="36" font-weight="700" letter-spacing="-0.5">Global Dental Care</text>
    <text x="124" y="80" fill="#cffafe" font-family="'Inter', 'Segoe UI', sans-serif" font-size="18" font-weight="500" letter-spacing="2">EVERY SMILE IS PRECIOUS</text>
  </g>

  <!-- Hero copy -->
  <g transform="translate(80, 290)">
    <text fill="#ffffff" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="76" font-weight="800" letter-spacing="-2">
      <tspan x="0" dy="0">Dehradun's Trusted</tspan>
      <tspan x="0" dy="86">Dental Clinic</tspan>
    </text>
    <text x="0" y="220" fill="#ecfeff" font-family="'Inter', 'Segoe UI', sans-serif" font-size="26" font-weight="500" opacity="0.92">
      Led by Dr. Dhruv Balooni · Neshvilla Road, Dehradun
    </text>
  </g>

  <!-- 5.0 Google badge -->
  <g transform="translate(80, 540)">
    <rect width="290" height="60" rx="30" fill="#ffffff"/>
    <!-- Star -->
    <path transform="translate(22, 16)" fill="#f59e0b"
          d="M14 0 17.5 9 27 10 20 16.5 22 26 14 21 6 26 8 16.5 1 10 10.5 9z"/>
    <text x="62" y="40" fill="#0f2c34" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="22" font-weight="700">
      5.0 on Google
    </text>
    <text x="200" y="40" fill="#6b7280" font-family="'Inter', 'Segoe UI', sans-serif" font-size="18" font-weight="500">
      · 35 reviews
    </text>
  </g>

  <!-- Right-side decorative tooth illustration -->
  <g transform="translate(820, 165)" opacity="0.95">
    <!-- Soft halo -->
    <circle cx="150" cy="150" r="180" fill="#ffffff" opacity="0.08"/>
    <circle cx="150" cy="150" r="130" fill="#ffffff" opacity="0.10"/>
    <!-- Tooth -->
    <g transform="translate(40, 30) scale(4.3)">
      <path fill="#ffffff"
            d="M32 6c-7 0-12 3.5-18 3.5S6 12 6 20c0 8 4 13 6 21 1 4.5 3 14 7 14 4.5 0 4.5-12 9.5-12h7c5 0 5 12 9.5 12 4 0 6-9.5 7-14 2-8 6-13 6-21 0-8-4-10.5-8-10.5S39 6 32 6z"/>
      <!-- subtle highlight -->
      <path fill="#cffafe" opacity="0.65"
            d="M16 14c2-1 5-2 8-2 1 0 1 2-1 3-3 1-7 4-9 8-2 4-3 8-3 12 0 1-2 1-2-1 0-7 3-15 7-20z"/>
    </g>
  </g>

  <!-- Phone strip bottom-right -->
  <g transform="translate(900, 555)">
    <text fill="#ecfeff" font-family="'Inter', 'Segoe UI', sans-serif" font-size="20" font-weight="600">
      📞 +91 80776 45073
    </text>
    <text y="28" fill="#cffafe" font-family="'Inter', 'Segoe UI', sans-serif" font-size="15" font-weight="500" opacity="0.85">
      global-dentalcare.in
    </text>
  </g>
</svg>
